name: 夸克网盘自动更新
on:
  workflow_dispatch:
    inputs:
      pwd:
        description: '最新提取码'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 直接执行 Node 脚本（零依赖+增强日志）
        run: |
          node << 'EOF'
          const https = require('https');
          const http = require('http');

          function customFetch(url, options = {}) {
            return new Promise((resolve, reject) => {
              const urlObj = new URL(url);
              const lib = urlObj.protocol === 'https:' ? https : http;

              const req = lib.request({
                hostname: urlObj.hostname,
                path: urlObj.pathname + urlObj.search,
                method: options.method || 'GET',
                headers: options.headers || {}
              }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  console.log(`[接口响应] ${url} 状态码: ${res.statusCode}`);
                  resolve({
                    ok: res.statusCode >= 200 && res.statusCode < 300,
                    status: res.statusCode,
                    json: () => {
                      try { return JSON.parse(data); } 
                      catch (e) { 
                        console.log(`[JSON解析失败] 响应内容: ${data}`);
                        throw e; 
                      }
                    }
                  });
                });
              });

              req.on('error', (err) => {
                console.log(`[请求错误] ${url}:`, err.message);
                reject(err);
              });
              if (options.body) req.write(options.body);
              req.end();
            });
          }

          const cookie = "${{ secrets.QUARK_COOKIE }}";
          const share_id = "7e2bc6ba4b21";
          const target_fid = "fe59d8d669e64f8e8e646480ef33f21c";
          const pwd = "${{ github.event.inputs.pwd }}";
          
          console.log(`[配置检查] 目标文件夹ID: ${target_fid}`);
          console.log(`[配置检查] 分享ID: ${share_id}`);
          console.log(`[配置检查] Cookie长度: ${cookie.length}`);
          
          const headers = {
            "Cookie": cookie,
            "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36",
            "Content-Type": "application/json",
            "Referer": "https://pan.quark.cn/",
            "Origin": "https://pan.quark.cn/"
          };

          (async () => {
            console.log("🔄 开始执行自动更新...");
            try {
              console.log("🧹 正在清空旧文件...");
              const listRes = await customFetch("https://pan.quark.cn/1/api/file/list", {
                method: "POST",
                headers: headers,
                body: JSON.stringify({ fid: target_fid, page_index: 1, page_size: 200 })
              });
              
              if (!listRes.ok) throw new Error(`文件列表接口异常: ${listRes.status}`);
              const listData = await listRes.json();
              console.log(`[文件列表] 获取到 ${listData.data?.list?.length || 0} 个文件`);
              
              const files = listData.data?.list || [];
              if (files.length > 0) {
                const fids = files.map(f => f.fid);
                await customFetch("https://pan.quark.cn/1/api/file/delete", {
                  method: "POST",
                  headers: headers,
                  body: JSON.stringify({ fids, is_delete: true })
                });
                console.log(`✅ 已清理 ${files.length} 个旧文件`);
              } else {
                console.log("✅ 文件夹无旧文件，跳过清理");
              }

              console.log("🔍 正在获取分享资源...");
              const shareRes = await customFetch("https://pan.quark.cn/1/api/share/transfer/list", {
                method: "POST",
                headers: headers,
                body: JSON.stringify({
                  share_id: share_id,
                  pwd: pwd,
                  page_index: 1,
                  page_size: 100,
                  fid: ""
                })
              });

              if (!shareRes.ok) throw new Error(`分享接口异常: ${shareRes.status}`);
              const shareData = await shareRes.json();
              console.log(`[分享接口] 响应码: ${shareData.code}, 消息: ${shareData.message || '无'}`);
              
              if (shareData.code !== 0) throw new Error(`分享目录获取失败: ${shareData.message || "未知错误"}`);
              const shareList = shareData.data?.list || [];
              
              if (shareList.length === 0) throw new Error("分享目录为空，无文件可转存");
              const targetFolder = shareList[0];
              console.log(`[分享目录] 找到文件夹: ${targetFolder.file_name}, ID: ${targetFolder.fid}`);

              console.log("📤 正在转存最新资源...");
              const saveRes = await customFetch("https://pan.quark.cn/1/api/share/transfer/save", {
                method: "POST",
                headers: headers,
                body: JSON.stringify({
                  share_id: share_id,
                  pwd: pwd,
                  save_list: [{ fid: targetFolder.fid, is_dir: targetFolder.is_dir }],
                  to_fid: target_fid
                })
              });

              if (!saveRes.ok) throw new Error(`转存接口异常: ${saveRes.status}`);
              const saveData = await saveRes.json();
              console.log(`[转存接口] 响应码: ${saveData.code}, 消息: ${saveData.message || '无'}`);
              
              if (saveData.code === 0) {
                console.log("🎉 资源更新成功！");
              } else {
                throw new Error(`转存失败: ${saveData.message || "未知错误"}`);
              }

            } catch (error) {
              console.log("❌ 执行失败:", error.message);
              process.exit(1);
            }
          })();
          EOF
