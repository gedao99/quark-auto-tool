name: 夸克网盘自动更新
on:
  workflow_dispatch:
    inputs:
      pwd:
        description: '最新提取码'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装依赖
        run: npm install node-fetch@3.3.2

      - name: 执行更新脚本
        run: |
          const fetch = require('node-fetch');
          // 配置区
          const cookie = "${{ secrets.QUARK_COOKIE }}";
          const share_id = "7e2bc6ba4b21";
          const target_fid = "fe59d8d669e64f8e8e646480ef33f21c";
          const pwd = "${{ github.event.inputs.pwd }}";
          
          const headers = {
            "Cookie": cookie,
            "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36",
            "Content-Type": "application/json",
            "Referer": "https://pan.quark.cn/",
            "Origin": "https://pan.quark.cn/"
          };

          (async () => {
            console.log("🔄 开始执行自动更新...");
            try {
              // 1. 清空目标文件夹旧文件
              console.log("🧹 正在清空旧文件...");
              const listRes = await fetch("https://pan.quark.cn/1/api/file/list", {
                method: "POST",
                headers: headers,
                body: JSON.stringify({ fid: target_fid, page_index: 1, page_size: 200 })
              });
              
              if (!listRes.ok) throw new Error(`文件列表接口异常: ${listRes.status}`);
              const listData = await listRes.json();
              const files = listData.data?.list || [];
              
              if (files.length > 0) {
                const fids = files.map(f => f.fid);
                await fetch("https://pan.quark.cn/1/api/file/delete", {
                  method: "POST",
                  headers: headers,
                  body: JSON.stringify({ fids, is_delete: true })
                });
                console.log(`✅ 已清理 ${files.length} 个旧文件`);
              } else {
                console.log("✅ 文件夹无旧文件，跳过清理");
              }

              // 2. 获取分享目录
              console.log("🔍 正在获取分享资源...");
              const shareRes = await fetch("https://pan.quark.cn/1/api/share/transfer/list", {
                method: "POST",
                headers: headers,
                body: JSON.stringify({
                  share_id: share_id,
                  pwd: pwd,
                  page_index: 1,
                  page_size: 100,
                  fid: ""
                })
              });

              if (!shareRes.ok) throw new Error(`分享接口异常: ${shareRes.status}`);
              const shareData = await shareRes.json();
              
              if (shareData.code !== 0) throw new Error(`分享目录获取失败: ${shareData.message || "未知错误"}`);
              const shareList = shareData.data?.list || [];
              
              if (shareList.length === 0) throw new Error("分享目录为空，无文件可转存");
              const targetFolder = shareList[0];

              // 3. 转存新资源到目标文件夹
              console.log("📤 正在转存最新资源...");
              const saveRes = await fetch("https://pan.quark.cn/1/api/share/transfer/save", {
                method: "POST",
                headers: headers,
                body: JSON.stringify({
                  share_id: share_id,
                  pwd: pwd,
                  save_list: [{ fid: targetFolder.fid, is_dir: targetFolder.is_dir }],
                  to_fid: target_fid
                })
              });

              if (!saveRes.ok) throw new Error(`转存接口异常: ${saveRes.status}`);
              const saveData = await saveRes.json();
              
              if (saveData.code === 0) {
                console.log("🎉 资源更新成功！");
              } else {
                throw new Error(`转存失败: ${saveData.message || "未知错误"}`);
              }

            } catch (error) {
              console.log("❌ 执行失败:", error.message);
              process.exit(1);
            }
          })();
